server:
  port: 8080
  address: 0.0.0.0
spring:
  application:
    name: ventas-libros
  security:
    filter:
      dispatcher-types: request
  datasource:
    url: jdbc:mysql://localhost:3306/db_appbiblioteca?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never
app:
  jwt:
    secret: "0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF"
    expiration-ms: 86400000
